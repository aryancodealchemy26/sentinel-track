<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sentinel Track</title>
</head>
<body style="font-family: sans-serif; padding: 20px;">
    <h2>Sentinel-Track Dashboard</h2>

    <form action="/add" method="post" style="margin-bottom: 20px;">
        <input type="text" name="name" placeholder="Site Name" required>
        <input type="text" name="url" placeholder="https://google.com" required>
        <button type="submit">Add Site</button>
    </form>

    <table border="1" style="width: 100%; text-align: left;">
        <tr style="background: #f4f4f4;">
            <th>Name</th>
            <th>URL</th>
            <th>Status</th>
        </tr>
        <tr th:each="s : ${list}">
            <td th:text="${s.name}"></td>
            <td th:text="${s.url}"></td>
            <td th:text="${s.st}"></td>
        </tr>
    </table>
</body>
</html>
