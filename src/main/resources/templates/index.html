<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sentinel-Track | Professional API Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .dashboard-card { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status-up { background-color: #d1e7dd; color: #0f5132; }
        .status-down { background-color: #f8d7da; color: #842029; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🛡️ SENTINEL-TRACK</span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card dashboard-card p-4 mb-4">
                <h5 class="card-title">Add New Sentinel</h5>
                <form action="/add" method="post">
                    <div class="mb-3">
                        <input type="text" name="name" class="form-control" placeholder="Project Name" required>
                    </div>
                    <div class="mb-3">
                        <input type="url" name="url" class="form-control" placeholder="https://example.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Deploy Monitor</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card dashboard-card p-0 overflow-hidden">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Service</th>
                            <th>Endpoint</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${list}">
                            <td class="fw-bold" th:text="${s.name}"></td>
                            <td><small th:text="${s.url}"></small></td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${s.st == 'UP'} ? 'status-up' : 'status-down'"
                                      th:text="${s.st}">
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
